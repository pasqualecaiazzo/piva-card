<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dati di Fatturazione - CAIAZZO GENNARO</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Google Fonts for premium minimalist typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- QR Code Library via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Main Card Section -->
        <main class="card-wrapper" id="cardView">
            <header class="card-header">
                <span class="card-badge">Dati di Fatturazione</span>
                <h1 id="displayName" class="company-name">CAIAZZO GENNARO</h1>
            </header>

            <div class="card-body">
                <!-- Data Fields -->
                <div class="info-grid">
                    <!-- Partita IVA -->
                    <div class="info-row" id="row-piva">
                        <div class="info-label">Partita IVA</div>
                        <div class="info-value-wrapper">
                            <span id="displayPIVA" class="info-value code-font">01451530057</span>
                            <button class="btn-copy" onclick="copyField('displayPIVA', this)" aria-label="Copia Partita IVA">
                                <svg class="icon-copy" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <svg class="icon-check hidden" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Copia</span>
                            </button>
                        </div>
                    </div>

                    <!-- Codice Fiscale -->
                    <div class="info-row" id="row-cf">
                        <div class="info-label">Codice Fiscale</div>
                        <div class="info-value-wrapper">
                            <span id="displayCF" class="info-value code-font">CZZGNR60B29F839A</span>
                            <button class="btn-copy" onclick="copyField('displayCF', this)" aria-label="Copia Codice Fiscale">
                                <svg class="icon-copy" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <svg class="icon-check hidden" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Copia</span>
                            </button>
                        </div>
                    </div>

                    <!-- Codice SDI -->
                    <div class="info-row" id="row-sdi">
                        <div class="info-label">Codice Destinatario (SDI)</div>
                        <div class="info-value-wrapper">
                            <span id="displaySDI" class="info-value code-font">KRRH6B9</span>
                            <button class="btn-copy" onclick="copyField('displaySDI', this)" aria-label="Copia Codice SDI">
                                <svg class="icon-copy" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <svg class="icon-check hidden" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Copia</span>
                            </button>
                        </div>
                    </div>

                    <!-- PEC (Optional, hidden if empty) -->
                    <div class="info-row hidden" id="row-pec">
                        <div class="info-label">PEC</div>
                        <div class="info-value-wrapper">
                            <span id="displayPEC" class="info-value"></span>
                            <button class="btn-copy" onclick="copyField('displayPEC', this)" aria-label="Copia PEC">
                                <svg class="icon-copy" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <svg class="icon-check hidden" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Copia</span>
                            </button>
                        </div>
                    </div>

                    <!-- Indirizzo Sede Legale -->
                    <div class="info-row" id="row-address">
                        <div class="info-label">Sede Legale</div>
                        <div class="info-value-wrapper">
                            <span id="displayAddress" class="info-value code-font">VIA ROMA 25 - 14031 GRANA (AT)</span>
                            <button class="btn-copy" onclick="copyField('displayAddress', this)" aria-label="Copia Sede Legale">
                                <svg class="icon-copy" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <svg class="icon-check hidden" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Copia</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- QR Code Block -->
                <div class="qr-section">
                    <div class="qr-container">
                        <canvas id="qrcodeCanvas"></canvas>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
